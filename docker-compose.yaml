services:
  # SQL Server 2025 dung lam source database cho demo CDC.
  # Data duoc luu vao volume sql2025data de khong mat khi container restart.
  # File mssql.conf duoc mount read-only de cau hinh SQL Server.
  sql2025cdc:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: sql2025cdc
    hostname: sql2025cdc
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "StrongPassw0rd!"
    ports:
      - "1434:1433"
    volumes:
      - sql2025data:/var/opt/mssql
      - ./mssql:/var/opt/mssql:ro
  # ZooKeeper quan ly metadata/coordination cho Kafka trong setup Debezium 2.6.
  # Kafka service ben duoi ket noi toi ZooKeeper qua zookeeper:2181.
  zookeeper:
    image: quay.io/debezium/zookeeper:2.6
    container_name: zookeeper
    ports:
      - "2181:2181"

  # Kafka la message broker nhan cac event thay doi du lieu tu Debezium.
  # Change events tu SQL Server CDC duoc publish vao Kafka topic de consumer doc tiep.
  kafka:
    image: quay.io/debezium/kafka:2.6
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      ZOOKEEPER_CONNECT: zookeeper:2181
    depends_on:
      - zookeeper

  # Debezium Connect chay Kafka Connect va plugin Debezium SQL Server connector.
  # Service nay doc CDC log tu SQL Server roi day change events sang Kafka.
  # Port 8083 la REST API de tao, xem va quan ly connector.
  connect:
    image: quay.io/debezium/connect:2.6
    container_name: connect
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: sqlserver-cdc-demo
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    depends_on:
      - kafka
      - sql2025cdc

volumes:
  # Volume luu data files cua SQL Server ben ngoai vong doi container.
  sql2025data: