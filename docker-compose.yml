services:
  web:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      APP_ENV: "${APP_ENV:-local}"
      APP_DEBUG: "${APP_DEBUG:-true}"
      APP_TIMEZONE: "${APP_TIMEZONE:-Asia/Ho_Chi_Minh}"
      APP_LOG_FILE: "/var/www/html/storage/logs/app.log"
      SESSION_NAME: "${SESSION_NAME:-AUTOWASH_SESSION}"
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: "${DB_NAME:-autowash}"
      DB_USER: "${DB_USER:-autowash}"
      DB_PASSWORD: "${DB_PASSWORD:-autowash_local}"
      DB_CHARSET: utf8mb4
      DB_TIMEZONE: "+07:00"
    volumes:
      - .:/var/www/html
      - app_logs:/var/www/html/storage/logs
      - app_uploads:/var/www/html/storage/uploads
    entrypoint: ["/var/www/html/docker/php/entrypoint.sh"]
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    ports:
      - "${DB_FORWARD_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: "${DB_NAME:-autowash}"
      MYSQL_USER: "${DB_USER:-autowash}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-autowash_local}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-autowash_root_local}"
      TZ: "${APP_TIMEZONE:-Asia/Ho_Chi_Minh}"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql_data:
  app_logs:
  app_uploads:
